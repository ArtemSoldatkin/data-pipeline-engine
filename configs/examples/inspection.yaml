baseline:
  source: previous_run # other options could be: rolling_window, reference_dataset

row_count:
  change_pct:
    warn_above: 25
    fail_above: 50

null_fraction:
  columns:
    score:
      warn_change_pct: 10
      fail_change_pct: 30

distinct_count:
  columns:
    id:
      warn_change_pct: 10
      fail_change_pct: 25
    status:
      warn_change_pct: 20
    score_bucket:
      warn_change_pct: 20

numeric_distribution_drift:
  columns:
    score:
      method: ks # psi | ks | js_divergence
      warn_above: 0.2
      fail_above: 0.4

categorical_distribution_drift:
  columns:
    status:
      warn_above: 0.15 # distribution distance
      fail_above: 0.3
    score_bucket:
      warn_above: 0.15
      fail_above: 0.3
